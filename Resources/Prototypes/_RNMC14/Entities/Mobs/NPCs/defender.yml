- type: entity
  parent: CMXenoDefender
  id: RMCXenoNPCDefender
  suffix: AI
  components:
  - type: NPCUseActionOnTarget
    actionId: ActionXenoCharge
  - type: Xeno
    role: CMXenoDefenderNPC
  - type: HTN
    rootTask:
      task: CMXenoCompound
    blackboard:
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
      VisionRadius: !type:Single
        30
      AggroVisionRadius: !type:Single
        30
  - type: MobThresholds
    thresholds:
      0: Alive
      350: Critical
      450: Dead
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 35
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 550
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          RNMCXenoGib:
            min: 1
            max: 1
            offset: 0
  - type: AcidBloodSplash
    closeSplashRadius: 0.5
    standardSplashRadius: 1.5
    gibSplashRadius: 2.5
    damage:
      types:
        Heat: 25

- type: entity
  parent: RMCXenoNPCDefender
  id: RNMCXenoNPCDefender
  suffix: CM|AI
  components:
  - type: Sprite
    sprite: _RMC14/Mobs/XenonidsCM/Defender/defender.rsi

