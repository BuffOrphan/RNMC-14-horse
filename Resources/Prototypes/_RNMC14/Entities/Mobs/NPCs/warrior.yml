- type: entity
  parent: CMXenoWarrior
  id: RMCXenoNPCWarrior
  suffix: AI
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      450: Critical
      550: Dead
  - type: HTN
    rootTask:
      task: CMXenoCompound
    blackboard:
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
      VisionRadius: !type:Single
        30
      AggroVisionRadius: !type:Single
        30
  - type: Xeno
    role: CMXenoWarriorNPC
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 31
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 550
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          RNMCXenoGib:
            min: 1
            max: 1
            offset: 0
  - type: AcidBloodSplash
    closeSplashRadius: 0.5
    standardSplashRadius: 1.5
    gibSplashRadius: 2.5
    damage:
      types:
        Heat: 25

- type: entity
  parent: RMCXenoNPCWarrior
  id: RNMCXenoNPCWarrior
  suffix: CM|AI
  components:
  - type: Sprite
    sprite: _RNMC14/Mobs/XenonidsCM/Warrior/warrior.rsi
