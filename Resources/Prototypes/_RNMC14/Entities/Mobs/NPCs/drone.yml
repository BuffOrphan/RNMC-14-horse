- type: entity
  parent: CMXenoDrone
  id: CMXenoDroneNPC
  name: Drone
  description: An alien drone.
  suffix: AI
  components:
  - type: HTN
    rootTask:
      task: CMXenoCompound
    blackboard:
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
      VisionRadius: !type:Single
        30
      AggroVisionRadius: !type:Single
        30
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Critical
      250: Dead
  - type: Xeno
    role: CMXenoDroneNPC
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 50
  - type: RMCSpawnEntitiesOnGib
    entities:
    - RMCDecalSpawnerGibsDrone # TODO one for every caste
    - RMCGibEffectXenoSmall # TODO larger gib effect for larger xenos
  - type: AcidBloodSplash
    closeSplashRadius: 0.5
    standardSplashRadius: 1.5
    gibSplashRadius: 2.5
    damage:
      types:
        Heat: 25