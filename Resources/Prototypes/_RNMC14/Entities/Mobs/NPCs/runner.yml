- type: entity
  parent: CMXenoRunner
  id: RMCXenoNPCRunner
  name: Runner
  description: A small red alien that looks like it could run fairly quickly...
  suffix: AI
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      150: Dead
  - type: HTN
    rootTask:
      task: CMXenoCompound
    blackboard:
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
      VisionRadius: !type:Single
        30
      AggroVisionRadius: !type:Single
        30
  - type: Xeno
    role: CMXenoRunnerNPC
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 550
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          RNMCXenoGib:
            min: 1
            max: 1
            offset: 0
  - type: AcidBloodSplash
    closeSplashRadius: 0.5
    standardSplashRadius: 1.5
    gibSplashRadius: 2.5
    damage:
      types:
        Heat: 25

- type: entity
  parent: RMCXenoNPCRunner
  id: RNMCXenoNPCRunner
  suffix: CM|AI
  components:
  - type: Sprite
    sprite: _RMC14/Mobs/XenonidsCM/Runner/runner.rsi
