- type: entity
  parent: CMXenoRunner
  id: CMXenoRunnerNPC
  name: Runner
  description: A small red alien that looks like it could run fairly quickly...
  suffix: AI
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      150: Dead
  - type: HTN
    rootTask:
      task: CMXenoCompound
    blackboard:
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
      VisionRadius: !type:Single
        30
      AggroVisionRadius: !type:Single
        30
  - type: Xeno
    role: CMXenoRunnerNPC
  - type: RMCSpawnEntitiesOnGib
    entities:
    - RMCDecalSpawnerGibsDrone # TODO one for every caste
    - RMCGibEffectXenoSmall # TODO larger gib effect for larger xenos
  - type: AcidBloodSplash
    closeSplashRadius: 0.5
    standardSplashRadius: 1.5
    gibSplashRadius: 2.5
    damage:
      types:
        Heat: 25