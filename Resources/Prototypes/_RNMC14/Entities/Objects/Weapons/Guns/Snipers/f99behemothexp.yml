- type: entity
  parent: RMCBaseWeaponSniperRifle
  id: RNMCF99BehemothSniperRifleEXP
  name: F-101 «Behemoth» EXP
  description: A formidable weapon designed for large individuals. Accepts cartridges of the largest and heaviest caliber in order to neutralize them. It is used in situations where you know for sure that the enemy is strong. The reloading of weapons and their rate of fire are extremely slow.
  components:
  - type: Sprite
    sprite: _RNMC14/Objects/Weapons/Guns/Snipers/f99behemoth/f99behemoth_inhands.rsi
    layers:
    - state: base
      sprite: _RNMC14/Objects/Weapons/Guns/Snipers/f99behemoth/f99behemoth_icon.rsi
  - type: Item
    size: Large
  - type: Clothing
    sprite: _RNMC14/Objects/Weapons/Guns/Snipers/f99behemoth/f99behemoth_inhands.rsi
  - type: Tag
    tags:
    - RNMCF99BehemothSniperRifleEXP
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 8
  - type: Gun
    shotsPerBurst: 1
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_sniper_heavy.ogg
  - type: RMCSelectiveFire
    recoilWielded: 1
    scatterWielded: 0
    baseFireRate: 0.700
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 2.5
  - type: WieldDelay
    baseDelay: 1
  - type: BallisticAmmoProvider
    cycleable: false
    whitelist:
      tags:
      - RNMCBulletBehemothEXP
      - RNMCBulletBehemothEXPI
    proto: RNMCBulletBehemothEXP
    capacity: 1
  - type: GunUserWhitelist
    whitelist:
      components:
      - SniperWhitelist
  - type: AttachableHolder
    slots:
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentS42xTelescopicMiniscope
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-rail: 0.0100, 0.100
  - type: GunRequiresWield
  - type: Corrodible
    isCorrodible: false
  - type: RMCNameItemOnVend
    item: PrimaryGun
  - type: AimedShot
    aimDuration: 2
    aimedShotCooldown: 5
  - type: RMCFocusedShooting
  - type: UniqueAction
  - type: BreechLoaded
    needOpenClose: true
    openSound:
      path: "/Audio/_RMC14/Weapons/Guns/Breech/pkd_open_chamber.ogg"
    closeSound:
      path: "/Audio/_RMC14/Weapons/Guns/Breech/pkd_close_chamber.ogg"
  - type: MagazineAmmoProvider
    autoEject: false
    soundAutoEject: null

