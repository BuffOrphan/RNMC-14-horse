#Projectiles

#Explosive EXP Projectile
- type: entity
  parent: RMCProjectileRocket84mm
  id: RNMCProjectileBehemothEXP
  name: BehemothEXP
  categories: [ HideSpawnMenu ]
  components:
  - type: DeleteOnFixedDistanceStop
  - type: TriggerOnCollide
    fixtureID: projectile
    ignoreOtherNonHard: false
  - type: Projectile
    impactEffect: BulletImpactEffect
    damage:
      types:
        Blunt: 25
        Piercing: 15
      maxFixedRange: 0
  - type: TriggerOnFixedDistanceStop
    delay: 0
  - type: DeleteOnTrigger
  - type: SpawnOnTerminate
    spawn: RNMCBehemothEXPImpact
  - type: ProjectileGrenade
    evenSpread: true
    minVelocity: 0.5
    maxVelocity: 1.5
    fillPrototype: RMCShrapnelJagged
    rebounds: true
    capacity: 8
    spreadAngle: 25
  - type: RMCProjectileAccuracy
    accuracy: 110
    thresholds:
    - range: 8
      falloff: 10
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Projectiles/projectiles.rsi
    scale: "1.2, 1.2"
    layers:
    - state: ltb
      shader: unshaded

  #Incendiary EXP
- type: entity
  parent: RMCBaseBullet
  id: RNMCProjectileBehemothEXPI
  name: BehemothEXPI
  categories: [ HideSpawnMenu ]
  components:
  - type: DeleteOnFixedDistanceStop
  - type: TriggerOnCollide
    fixtureID: projectile
    ignoreOtherNonHard: false
  - type: IgniteOnProjectileHit
  - type: RMCFireProjectile
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/firesentry_projectile.rsi
    layers:
    - state: pulse0
      shader: unshaded
  - type: Projectile
    deleteOnCollide: true
    impactEffect: null
    forceSound: true
    damage:
      types:
        Heat: 30
    soundHit: null
  - type: TriggerOnFixedDistanceStop
    delay: 0
  - type: DeleteOnTrigger
  - type: SpawnOnTerminate
    spawn: RNMCBehemothEXPIImpact
    projectileAdjust: false
  - type: IgnoreArc
  - type: IgnorePredictionHide
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.45,0.15,0.15"
        hard: false
        mask:
        - Impassable
        - BulletImpassable

## Impacts

