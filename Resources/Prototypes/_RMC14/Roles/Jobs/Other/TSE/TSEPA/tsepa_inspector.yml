# TWEPA Inspector
- type: job
  parent: CMJobBase
  id: RMCTWEPAInspector
  name: rmc-job-name-tsepa-inspector
  description: rmc-job-description-tsepa-inspector
  playTimeTracker: RMCJobTWEPAInspector
  ranks:
    RMCRankTWEPAInspector: []
  startingGear: RMCGearTWEPAInspector
  icon: "RMCJobIconTWEPAInspector"
  joinNotifyCrew: false
  accessGroups:
  - ColonistTWEPAInspector
  special:
