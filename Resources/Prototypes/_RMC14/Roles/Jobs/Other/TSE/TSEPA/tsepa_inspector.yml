- type: startingGear
  id: RMCGearTWEPAInspector
  equipment:
    head: RMCHeadCapTWEPAPeaked
    ears: RMCHeadsetTWEPA
    jumpsuit: RMCJumpsuitTWEPA
    gloves: RMCHandsVeteran
    shoes: CMBootsBlackFilled
    id: RMCIDCardTWEPAGold
    belt: RMCBeltHolsterRevolverSpearheadFill
