- type: entity
  parent: CMSpawnPointJobBase
  id: RMCSpawnPointTWEPAInspector
  name: tsepa inspector spawn point
  components:
  - type: SpawnPoint
    job_id: RMCTWEPAInspector
  - type: Sprite
    layers:
    - sprite: Markers/jobs.rsi
      state: green
    - sprite: _RMC14/Objects/Clothing/OuterClothing/CMB/cmb_sheriff_armor.rsi
      state: icon

- type: playTimeTracker
  id: RMCJobTWEPAInspector
  isHumanoid: true

- type: jobIcon
  parent: CMJobIconBase
  id: RMCJobIconTWEPAInspector
  icon:
    sprite: _RMC14/Interface/cm_job_icons.rsi
    state: tse_painspector
