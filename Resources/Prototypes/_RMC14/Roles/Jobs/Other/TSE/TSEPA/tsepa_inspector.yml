    components:
    - type: Skills
      skills:
        RMCSkillEngineer: 1
        RMCSkillMeleeWeapons: 1
        RMCSkillConstruction: 1
        RMCSkillMedical: 2
        RMCSkillEndurance: 3
        RMCSkillCqc: 3
        RMCSkillFirearms: 2
        RMCSkillPolice: 0
        RMCSkillFireman: 2
        RMCSkillLeadership: 2
    - type: MarineOrders
    - type: NpcFactionMember
      factions:
      - TWE
    - type: RMCPointing
    - type: CommandAccent
    - type: JobPrefix
      prefix: rmc-job-prefix-tsepa-inspector
