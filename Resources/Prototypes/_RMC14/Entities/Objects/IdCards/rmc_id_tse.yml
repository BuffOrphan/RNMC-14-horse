- type: entity
  parent: CMIDCardBase
  id: RMCIDCardTWEPA
  name: TWEPA silver badge
  description: The silver badge which represents that the wearer is a TWEPA Constable. It is a sign of justice, authority, and protection. Protecting those who can't. This badge represents a commitment to a sworn oath always kept.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/CMIDs/tsepa_silver.rsi
    state: tsepa
  - type: Clothing
    slots:
    - idcard
    sprite: _RMC14/Objects/CMIDs/tsepa_silver.rsi
  - type: ItemIFF
    factions:
    - FactionTWE

