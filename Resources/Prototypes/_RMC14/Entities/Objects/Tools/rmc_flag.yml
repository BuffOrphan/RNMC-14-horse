- type: entity
  abstract: true
  parent: BaseItem
  id: RMCFlagCarriableBase
  name: flag
  components:
  - type: Sprite
    layers:
    - state: icon
      map: [ "base" ]
  - type: Item
    size: Large
  - type: Corrodible
    isCorrodible: false
  - type: Appearance
  - type: PlantableFlag
  - type: GenericVisualizer
    visuals:
      enum.PlantableFlagVisuals.Planted:
        base:
          True: { state: deploy }
          False: { state: icon }

- type: entity
  parent: RMCFlagCarriableBase
  id: RMCFlagCarriableUN
  name: UN flag
  description: "The flag of the UN." # This one looks ready to be planted into the ground."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Flags/un_flag.rsi
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-un-flag
    factions:
    - USCM

- type: entity
  parent: RMCFlagCarriableBase
  id: RMCFlagCarriableUSCM
  name: USCM flag
  description: "The flag of the USCM." # This one looks ready to be planted into the ground."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Flags/uscm_flag.rsi
