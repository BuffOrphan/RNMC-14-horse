# Civilians
- type: entity
  parent: RMCUniformBase
  id: CMJumpsuitSPPCiv1
  name: UPP civilian-style orange overalls
  description: A set of civilian-style orange overalls with a dark tan undershirt. The material is of a poor quality, however it's better than nothing. Clothing of this style is typically given out to those who work laborious jobs.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/UPP/civ1.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: CMJumpsuitSPPCiv2
  name: UPP civilian-style tan overalls
  description: A set of civilian-style tan overalls with a blue undershirt. The material is of a poor quality, however it's better than nothing. Clothing of this style is typically given to those who work laborious jobs.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/UPP/civ2.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: CMJumpsuitSPPCiv3
  name: UPP civilian-style shirt and pants
  description: A set of civilian-style tan shirt and jeans. The material, while poor, is comfortable enough to be worn during all periods of the day.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/UPP/civ3.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: CMJumpsuitSPPCiv4
  name: UPP civilian-style vest and pants
  description: A set of civilian-style brown vest and orange pants. The material is surprisingly decent, something not often worn by the civilians of the UPP for two reasons. They typically can't afford such clothing, and if they can, it paints a target on their back.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/UPP/civ4.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: RMCJumpsuitSPPCiv5
  name: "Chǎnyè Combine mining overalls"
  description: "A durable, olive-green jumpsuit worn beneath a sleeveless, puffy orange work vest—standard issue for Chǎnyè Combine laborers. The vest's faded fabric is lined with reinforced padding, offering minimal protection against workplace hazards. A red star insignia is stamped on the back, marking its wearer as part of the Combine’s industrial workforce. Stiff, uncomfortable, and mass-produced, but better than nothing in the unforgiving conditions of deep-space labor."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/UPP/civ5.rsi

- type: entity
  parent: CMJumpsuitSPPCiv1
  id: CMJumpsuitSPPBear
  name: Iron Bear uniform
  description: A uniform worn by Iron Bears mercenaries. Smells a little like an actual bear.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Uniforms/UPP/bear.rsi
