- type: radioChannel
  id: TWE
  name: chat-radio-tse
  keycode: "'" # I hate this
  frequency: 1551
  color: "#9a1228"
  longRange: true
  tower: true

- type: entity
  parent: CMEncryptionKey
  id: RMCEncryptionKeyTWE
  name: TWE radio encryption key
  components:
  - type: Sprite
    state: cmp_key
  - type: EncryptionKey
    channels:
    - TWE
    defaultChannel: TWE

- type: entity
  parent: RMCEncryptionKeyTWE
  id: RMCEncryptionKeyTWEPA
  name: TWEPA radio encryption key
  components:
  - type: EncryptionKey
    channels:
    - TWE
    - Colony
    defaultChannel: TWE

- type: entity
  abstract: true
  parent: RMCHeadsetIconsTWE
  id: RMCHeadsetTWEAbstract
  components:
  - type: GrantSquadLeaderTracker
    defaultMode: InspectorTWEPA
    trackerModes:
    - InspectorTWEPA
    - SeniorConstableTWEPA
  - type: GrantTacMapAlert

- type: entity
  parent: RMCHeadsetTWEAbstract
  id: RMCHeadsetTWE
  name: TWE headset
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyTWE

- type: entity
  parent: RMCHeadsetTWEAbstract
  id: RMCHeadsetTWEPA
  name: TWEPA headset
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyTWEPA
